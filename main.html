<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="index.css">

  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">

  <script src="https://kit.fontawesome.com/6f527b6b24.js" crossorigin="anonymous"></script>

  <title>PixelArcade</title>
</head>

<body>
    <audio id="background"></audio>
    <div id="header">
        <div class="left">
            <a href="index.html" target = "_self">PixelArcade</a>
            <!-- <a href=""><i class="fa-duotone fa-solid fa-bars"></i></a> -->
            <a href="">Home</a>
            <a href="">Reviews</a>
        </div>
        <div class="right">
            <input id="search" type="text" placeholder="🔎 Search for games...">
        </div>
    </div>
    <div id="mainlayout">
        <div id="sidebar">
            <h2>New Releases</h2>
            <a href="">Last 30 Days</a>
            <a href="">This Week</a>
            <a href="">Next Week</a>
            <h2>Top</h2>
            <a href="">Best of the year</a>
            <a href="">Popular in 2025</a>
            <a href="">All time top 250</a>
            <h2><a href="">All Games</a></h2>
            <h2>Browse</h2>
            <h2>Platforms</h2>
            <h2>Genres</h2>
        </div>
        <div id="content">
            <div id="filter">
                <div class = "filter-buttons">
                    <label>Order By:</label>
                    <select id="order-by">
                        <option>Date Added</option>
                        <option>Name</option>
                        <option>Release Date</option>
                        <option>Popularity</option>
                        <option>Average Rating</option>
                    </select>
                </div>
                <div class = "filter-buttons">
                    <label>Platforms:</label>
                    <select id="platforms">
                        <option>PC</option>
                        <option>Playstation</option>
                        <option>Xbox</option>
                        <option>IOS</option>
                        <option>Android</option>
                        <option>Mac</option>
                        <option>Linux</option>
                        <option>Nintendo</option>
                    </select>
                </div>
            </div>
            <div id="games"></div>
            <div class="load-more">
                <button id="loadMore">Load More</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
