<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="index.css">

  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">

  <script src="https://kit.fontawesome.com/6f527b6b24.js" crossorigin="anonymous"></script>

  <title>PixelArcade</title>
</head>

<body>
    <audio id="background"></audio>
    <div id="header">
        <div class="left">
            <a href="index.html" target = "_self">PixelArcade</a>
            <a href="#" id="menu-toggle">
            <i class="fa-solid fa-bars"></i>
            </a>
            <a href="">Home</a>
            <a href="">Reviews</a>
        </div>
        <div class="right">
            <input id="search" type="text" placeholder="🔎 Search for games...">
        </div>
    </div>
    <div id="overlay"></div>
    <div id="mainlayout">
        <div id="sidebar">
            <h2>New Releases</h2>
            <a href="#" id="last30">Last 30 Days</a>
            <a href="#" id="thisWeek">This Week</a>
            <a href="#" id="nextWeek">Next Week</a>
            <h2>Top</h2>
            <a href="#" id="bestYear">Best of the year</a>
            <a href="#" id="popular2025">Popular in 2025</a>
            <a href="#" id="topAll">All time top 250</a>
            <h2><a href="">All Games</a></h2>
            <h2>Browse</h2>
            <h2>Platforms</h2>
            <h2>Genres</h2>
        </div>
        <div id="content">
            <div id="filter">
                <div class = "filter-buttons">
                    <label>Order By:</label>
                    <select id="order-by">
                    <option value="date_added">Date Added</option>
                    <option value="name">Name</option>
                    <option value="released">Release Date</option>
                    <option value="-added">Popularity</option>
                    <option value="-rating">Rating</option>
                    </select>
                </div>
                <div class = "filter-buttons">
                    <label>Platforms:</label>
                    <select id="platforms">
                    <option value="">All</option>
                    <option value="4">PC</option>
                    <option value="187">Playstation</option>
                    <option value="1">Xbox</option>
                    <option value="3">IOS</option>
                    <option value="21">Android</option>
                    </select>
                </div>
            </div>
            <div id="games"></div>
            <div class="load-more">
                <button id="loadMore">Load More</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
