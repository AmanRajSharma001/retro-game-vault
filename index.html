<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="index.css">

  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">

  <script src="https://kit.fontawesome.com/6f527b6b24.js" crossorigin="anonymous"></script>

  <title>PixelArcade</title>
</head>
<body>
  <div id="intro">
    <video id="bg-video" autoplay muted loop>
      <source src="video/bgvideo.mp4" type="video/mp4">
    </video>
    <div id="intro-content">
      <h1 id="title"></h1>
      <p id="press">PRESS ENTER</p>
      <audio id="enter">
        <source src="audio/Enter.mp3" type="audio/mpeg">
      </audio>
    </div>

    <div class="opening-animation" id="circle"></div>
  </div>

  <script src="index.js"></script>
</body>
</html>
